<div id="search-modal" class="search-modal" aria-hidden="true">
  <div class="search-backdrop" data-close-search></div>
  <div class="search-panel" role="dialog" aria-modal="true" aria-labelledby="search-title">
    <div class="search-panel-header">
      <h2 id="search-title">Search posts</h2>
      <button type="button" class="search-close" data-close-search aria-label="Close search">Close</button>
    </div>
    <p class="search-intro">Look up articles by title or keyword.</p>
    <input id="search-input" type="search" placeholder="Type to search..." autocomplete="off" />
    <ul id="search-results" class="search-results"></ul>
  </div>
</div>
